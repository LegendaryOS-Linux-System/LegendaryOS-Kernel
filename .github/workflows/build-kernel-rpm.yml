# =============================================================================
#  LegendaryOS Kernel — GitHub Actions
#  Buduje jądro ze źródeł i pakuje do .rpm
#
#  Strategia CPU: matrix build — trzy równoległe joby (v2 / v3 / v4)
#  Każdy produkuje osobny RPM zoptymalizowany pod swój poziom x86-64.
#  RPM trafia jako artefakt Actions — release robisz sam ręcznie.
# =============================================================================

name: Build LegendaryOS Kernel RPM

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: "Wersja kernela (np. 7.1). Puste = z config.toml"
        required: false
        default: ""

# Anuluj poprzedni run jeśli odpalisz nowy przed końcem starego
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # JOB 1: Walidacja config i patchy — jeden raz, przed budowaniem
  # ---------------------------------------------------------------------------
  validate:
    name: Validate config & patches
    runs-on: ubuntu-24.04
    outputs:
      kernel_version: ${{ steps.get-version.outputs.version }}

    steps:
      - name: Checkout repozytorium
        uses: actions/checkout@v4

      - name: Zainstaluj Ruby + gemy (Gemfile)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Pobierz wersję kernela z config.toml (lub override)
        id: get-version
        run: |
          if [ -n "${{ inputs.kernel_version }}" ]; then
            VERSION="${{ inputs.kernel_version }}"
          else
            VERSION=$(bundle exec ruby -e "require 'toml-rb'; puts TomlRB.load_file('config.toml').dig('kernel','version')")
          fi
          [ -n "$VERSION" ] || { echo "BŁĄD: Nie udało się odczytać wersji kernela"; exit 1; }
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Kernel version: ${VERSION}"

      - name: Waliduj config.toml
        run: |
          bundle exec ruby -e "
            require 'toml-rb'
            cfg = TomlRB.load_file('config.toml')
            abort 'Brak [kernel].version'   unless cfg.dig('kernel','version')
            abort 'Brak [build].output_dir' unless cfg.dig('build','output_dir')
            abort 'Brak [github].owner'     unless cfg.dig('github','owner')
            puts 'config.toml OK'
          "

      - name: Sprawdź patche
        run: |
          PATCH_COUNT=$(find patches/ -name '*.patch' | wc -l)
          echo "Znaleziono ${PATCH_COUNT} patchy:"
          find patches/ -name '*.patch' | sort | while read -r p; do
            echo "  → $p"
            [ -s "$p" ] || { echo "BŁĄD: Pusty plik: $p"; exit 1; }
          done
          echo "Walidacja patchy OK"

  # ---------------------------------------------------------------------------
  # JOB 2: Build — matrix (v2 / v3 / v4) — trzy równoległe joby
  # ---------------------------------------------------------------------------
  build:
    name: "Build kernel ${{ needs.validate.outputs.kernel_version }} [x86-64-${{ matrix.cpu }}]"
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    strategy:
      fail-fast: false
      matrix:
        cpu: [v2, v3, v4]

    steps:
      - name: Checkout repozytorium
        uses: actions/checkout@v4

      - name: Zainstaluj zależności buildowe
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc g++ make bc flex bison \
            libssl-dev libelf-dev dwarves pahole \
            rpm rpm2cpio \
            curl xz-utils tar \
            libncurses-dev \
            ccache zstd lz4 cpio
          gcc --version
          make --version
          rpmbuild --version

      - name: Zainstaluj Ruby + gemy (Gemfile)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      # Cache ccache osobny per poziom CPU — różne flagi -march
      - name: Cache ccache [${{ matrix.cpu }}]
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-kernel-${{ needs.validate.outputs.kernel_version }}-${{ matrix.cpu }}-${{ hashFiles('config.toml') }}
          restore-keys: |
            ccache-kernel-${{ needs.validate.outputs.kernel_version }}-${{ matrix.cpu }}-
            ccache-kernel-${{ matrix.cpu }}-

      - name: Konfiguruj ccache
        run: |
          ccache --max-size=10G
          ccache --zero-stats
          echo "CCACHE_DIR=${HOME}/.ccache" >> "$GITHUB_ENV"
          echo "PATH=/usr/lib/ccache:${PATH}" >> "$GITHUB_ENV"

      # Tarball źródeł wspólny dla wszystkich poziomów CPU
      - name: Cache tarball źródeł kernela
        uses: actions/cache@v4
        with:
          path: /tmp/legendaryos-kernel-build/linux-${{ needs.validate.outputs.kernel_version }}.tar.xz
          key: kernel-src-${{ needs.validate.outputs.kernel_version }}

      - name: Ustaw wersję kernela w config.toml (override)
        if: inputs.kernel_version != ''
        run: |
          sed -i "s/^version\s*=.*/version = \"${{ inputs.kernel_version }}\"/" config.toml
          echo "Wersja kernela: ${{ inputs.kernel_version }}"

      - name: Ustaw cpu_level = ${{ matrix.cpu }}
        run: |
          sed -i "s/^cpu_level\s*=.*/cpu_level = \"${{ matrix.cpu }}\"/" config.toml
          echo "cpu_level ustawiony na: ${{ matrix.cpu }}"
          grep cpu_level config.toml

      - name: Ustaw output_dir dla poziomu ${{ matrix.cpu }}
        run: |
          sed -i "s|^output_dir\s*=.*|output_dir = \"./output/${{ matrix.cpu }}\"|" config.toml
          mkdir -p "output/${{ matrix.cpu }}"

      - name: "Buduj kernel + pakuj RPM [x86-64-${{ matrix.cpu }}]"
        run: |
          echo "=== LegendaryOS Kernel Build ==="
          echo "Kernel:    ${{ needs.validate.outputs.kernel_version }}"
          echo "CPU level: x86-64-${{ matrix.cpu }}"
          echo "Runner:    $(uname -r) / $(nproc) vCPU / $(free -h | grep Mem | awk '{print $2}') RAM"
          echo "================================"
          bundle exec ruby build.rb

      - name: Statystyki ccache [${{ matrix.cpu }}]
        if: always()
        run: ccache --show-stats

      - name: Weryfikuj wygenerowane RPM [${{ matrix.cpu }}]
        run: |
          echo "=== RPM dla x86-64-${{ matrix.cpu }} ==="
          find "output/${{ matrix.cpu }}" -name "*.rpm" | sort | tee /tmp/rpm-list.txt
          [ -s /tmp/rpm-list.txt ] || { echo "BŁĄD: Brak plików .rpm!"; exit 1; }
          while read -r rpm; do
            echo ""
            echo "--- $rpm ---"
            rpm -qip "$rpm" || true
          done < /tmp/rpm-list.txt

      - name: "Upload RPM [x86-64-${{ matrix.cpu }}]"
        uses: actions/upload-artifact@v4
        with:
          name: "legendaryos-kernel-${{ needs.validate.outputs.kernel_version }}-x86-64-${{ matrix.cpu }}"
          path: "output/${{ matrix.cpu }}/**/*.rpm"
          retention-days: 30
          if-no-files-found: error

      - name: Upload logów buildu (tylko przy błędzie)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: "build-logs-${{ needs.validate.outputs.kernel_version }}-${{ matrix.cpu }}"
          path: |
            /tmp/legendaryos-kernel-build/**/*.log
            /tmp/legendaryos-kernel-build/**/build.log
          retention-days: 7
          if-no-files-found: ignore

      - name: "Podsumowanie [${{ matrix.cpu }}]"
        if: always()
        run: |
          KV="${{ needs.validate.outputs.kernel_version }}"
          CPU="${{ matrix.cpu }}"
          echo "## x86-64-${CPU}: LegendaryOS Kernel ${KV}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Parametr | Wartość |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Wersja kernela | \`${KV}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| CPU target | \`x86-64-${CPU}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Runner | \`ubuntu-24.04\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Pliki RPM (zakładka Artifacts)" >> "$GITHUB_STEP_SUMMARY"
          find "output/${CPU}" -name "*.rpm" 2>/dev/null | while read -r f; do
            SIZE=$(du -sh "$f" | cut -f1)
            echo "- \`$(basename "$f")\` (${SIZE})" >> "$GITHUB_STEP_SUMMARY"
          done
