# =============================================================================
#  LegendaryOS Kernel — GitHub Actions
#  Buduje jądro ze źródeł (x86-64-v3) i pakuje do .rpm
#  RPM trafia jako artefakt Actions — release robisz sam ręcznie.
# =============================================================================

name: Build LegendaryOS Kernel RPM

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: "Wersja kernela (np. 7.1). Puste = z config.toml"
        required: false
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # JOB 1: Walidacja config — szybki check przed ciężkim buildem
  # ---------------------------------------------------------------------------
  validate:
    name: Validate config & patches
    runs-on: ubuntu-24.04
    outputs:
      kernel_version: ${{ steps.get-version.outputs.version }}

    steps:
      - name: Checkout repozytorium
        uses: actions/checkout@v4

      - name: Zainstaluj Ruby + gemy
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Pobierz wersję kernela
        id: get-version
        run: |
          if [ -n "${{ inputs.kernel_version }}" ]; then
            VERSION="${{ inputs.kernel_version }}"
          else
            VERSION=$(bundle exec ruby -e "require 'toml-rb'; puts TomlRB.load_file('config.toml').dig('kernel','version')")
          fi
          [ -n "$VERSION" ] || { echo "BŁĄD: Nie udało się odczytać wersji kernela"; exit 1; }
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Kernel version: ${VERSION}"

      - name: Waliduj config.toml
        run: |
          bundle exec ruby -e "
            require 'toml-rb'
            cfg = TomlRB.load_file('config.toml')
            abort 'Brak [kernel].version'   unless cfg.dig('kernel','version')
            abort 'Brak [build].output_dir' unless cfg.dig('build','output_dir')
            puts 'config.toml OK'
          "

      - name: Sprawdź patche użytkownika
        run: |
          PATCH_COUNT=$(find patches/ -name '*.patch' 2>/dev/null | wc -l)
          if [ "$PATCH_COUNT" -gt 0 ]; then
            echo "Znaleziono ${PATCH_COUNT} patchy użytkownika:"
            find patches/ -name '*.patch' | sort | while read -r p; do
              echo "  → $p"
              [ -s "$p" ] || { echo "BŁĄD: Pusty plik: $p"; exit 1; }
            done
          else
            echo "Brak patchy użytkownika (OK — optymalizacje nakładane przez KernelConfigurator)."
          fi

  # ---------------------------------------------------------------------------
  # JOB 2: Build kernela x86-64-v3 + pakowanie RPM
  # ---------------------------------------------------------------------------
  build:
    name: "Build LegendaryOS Kernel ${{ needs.validate.outputs.kernel_version }} [x86-64-v3]"
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Checkout repozytorium
        uses: actions/checkout@v4

      - name: Zainstaluj zależności buildowe
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc g++ make bc flex bison \
            libssl-dev libelf-dev dwarves pahole \
            rpm rpm2cpio \
            curl xz-utils tar \
            libncurses-dev \
            ccache zstd lz4 cpio
          echo "=== Wersje narzędzi ==="
          gcc --version | head -1
          make --version | head -1
          rpmbuild --version

      - name: Zainstaluj Ruby + gemy
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-kernel-${{ needs.validate.outputs.kernel_version }}-v3-${{ hashFiles('config.toml') }}
          restore-keys: |
            ccache-kernel-${{ needs.validate.outputs.kernel_version }}-v3-
            ccache-kernel-v3-

      - name: Konfiguruj ccache
        run: |
          ccache --max-size=10G
          ccache --zero-stats
          echo "CCACHE_DIR=${HOME}/.ccache" >> "$GITHUB_ENV"
          echo "PATH=/usr/lib/ccache:${PATH}" >> "$GITHUB_ENV"

      - name: Cache tarball źródeł kernela
        uses: actions/cache@v4
        with:
          path: /tmp/legendaryos-kernel-build/linux-${{ needs.validate.outputs.kernel_version }}.tar.xz
          key: kernel-src-${{ needs.validate.outputs.kernel_version }}

      - name: Ustaw wersję kernela (override)
        if: inputs.kernel_version != ''
        run: |
          sed -i "s/^version\s*=.*/version = \"${{ inputs.kernel_version }}\"/" config.toml
          grep "^version" config.toml

      - name: Wymuś cpu_level = v3
        run: |
          sed -i "s/^cpu_level\s*=.*/cpu_level = \"v3\"/" config.toml
          grep cpu_level config.toml

      - name: "Buduj kernel + pakuj RPM [x86-64-v3]"
        run: |
          echo "=== LegendaryOS Kernel Build ==="
          echo "Kernel:    ${{ needs.validate.outputs.kernel_version }}"
          echo "CPU level: x86-64-v3"
          echo "Runner:    $(uname -r) / $(nproc) vCPU / $(free -h | grep Mem | awk '{print $2}') RAM"
          echo "================================"
          bundle exec ruby build.rb

      - name: Statystyki ccache
        if: always()
        run: ccache --show-stats

      - name: Weryfikuj wygenerowane RPM
        run: |
          echo "=== Wygenerowane pliki RPM ==="
          find output/ -name "*.rpm" | sort | tee /tmp/rpm-list.txt
          [ -s /tmp/rpm-list.txt ] || { echo "BŁĄD: Brak plików .rpm!"; exit 1; }
          while read -r rpm; do
            echo ""
            echo "--- $rpm ---"
            rpm -qip "$rpm" || true
          done < /tmp/rpm-list.txt

      - name: Upload RPM
        uses: actions/upload-artifact@v4
        with:
          name: "legendaryos-kernel-${{ needs.validate.outputs.kernel_version }}-x86-64-v3"
          path: output/**/*.rpm
          retention-days: 30
          if-no-files-found: error

      - name: Upload logów (tylko przy błędzie)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: "build-logs-${{ needs.validate.outputs.kernel_version }}"
          path: |
            /tmp/legendaryos-kernel-build/**/*.log
            /tmp/legendaryos-kernel-build/**/build.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Podsumowanie
        if: always()
        run: |
          KV="${{ needs.validate.outputs.kernel_version }}"
          echo "## LegendaryOS Kernel ${KV} [x86-64-v3]" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Parametr | Wartość |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Wersja kernela | \`${KV}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| CPU target | \`x86-64-v3\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Runner | \`ubuntu-24.04 / $(nproc) vCPU\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Pliki RPM" >> "$GITHUB_STEP_SUMMARY"
          find output/ -name "*.rpm" 2>/dev/null | while read -r f; do
            SIZE=$(du -sh "$f" | cut -f1)
            echo "- \`$(basename "$f")\` (${SIZE})" >> "$GITHUB_STEP_SUMMARY"
          done
